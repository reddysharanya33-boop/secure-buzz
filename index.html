
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SecureBuzz</title>
<script src="api.js"></script>
<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
    text-align: center;
}

header {
    background: linear-gradient(90deg, purple, deeppink);
    color: white;
    padding: 20px;
}

nav button {
    margin: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    background: #333;
    color: white;
    font-size: 14px;
}

nav button:hover {
    background: #555;
}

section {
    display: none;
    padding: 20px;
}

section.active {
    display: block;
}

.box {
    background: white;
    padding: 15px;
    margin: 15px auto;
    width: 80%;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

textarea {
    width: 80%;
    height: 100px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-family: Arial, sans-serif;
}

button {
    padding: 10px 20px;
    margin: 5px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    background: purple;
    color: white;
    font-size: 14px;
}

button:hover {
    background: darkviolet;
}

.sos-btn {
    background: red;
    color: white;
    padding: 15px;
    font-size: 16px;
    width: 90%;
    margin: 10px auto;
}

.sos-btn:hover {
    background: darkred;
}

.complaint-item, .story-item {
    background: #f9f9f9;
    border: 1px solid #ddd;
    padding: 8px;
    margin: 8px;
    border-radius: 5px;
    text-align: left;
}

.delete-btn {
    background: #ff6b6b;
    padding: 5px 10px;
    font-size: 12px;
    margin-left: 10px;
}

.delete-btn:hover {
    background: #ff5252;
}

.success {
    color: green;
    font-weight: bold;
}

.error {
    color: red;
    font-weight: bold;
}

input[type="file"] {
    margin: 10px 0;
    padding: 5px;
}

.emergency-contact-btn {
    background: #FF6B00;
    color: white;
    padding: 15px;
    font-size: 16px;
    width: 90%;
    margin: 10px auto;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.emergency-contact-btn:hover {
    background: #E55A00;
}

.open-stories-btn {
    background: #2196F3;
    color: white;
    padding: 10px 20px;
    margin: 5px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
}

.open-stories-btn:hover {
    background: #0b7dda;
}
</style>
</head>

<body>
<header>
<h1>🔐 SecureBuzz</h1>
<p>Women Safety & Entertainment Website</p>
</header>

<nav>
<button onclick="showSection('home')">Home</button>
<button onclick="showSection('sos')">SOS</button>
<button onclick="showSection('complaint')">Complaint</button>
<button onclick="showSection('stories')">Stories</button>
<button onclick="showSection('music')">Music</button>
</nav>

<!-- HOME -->
<section id="home" class="active">
<div class="box">
<h2>Welcome to SecureBuzz</h2>
<p>Your safety companion 💜</p>
<p>This application stores all data securely in MongoDB database</p>
</div>
</section>

<!-- SOS -->
<section id="sos">
<div class="box">
<h2>🚨 SOS Emergency</h2>

<button class="sos-btn" onclick="sendSOS()">🚨 SEND SOS ALERT TO ADMIN</button>
<button class="sos-btn" onclick="playSiren()">🔊 PLAY SOS SIREN</button>
<button class="emergency-contact-btn" onclick="showEmergencyContact()">📞 EMERGENCY CONTACT</button>

<p id="sosMsg"></p>

<audio id="siren">
<source src="siren.mp3" type="audio/mpeg">
</audio>
</div>
</section>

<!-- COMPLAINT -->
<section id="complaint">
<div class="box">
<h2>📝 Complaint Box</h2>

<textarea id="complaintText" placeholder="Type your complaint here..."></textarea><br><br>

<button onclick="saveComplaint()">Submit Complaint</button>
<p id="complaintMsg"></p>

<h3>📋 Submitted Complaints</h3>
<div id="complaintList"></div>
</div>
</section>

<!-- STORIES -->
<section id="stories">
<div class="box">
<h2>📖 Stories</h2>

<input type="file" id="storyFile" accept=".pdf,.doc,.docx,.txt" />
<br>

<button onclick="uploadStory()">Upload Story</button>
<button class="open-stories-btn" onclick="openStories()">📂 Open All Stories</button>
<p id="storyMsg"></p>

<h3 style="margin-top:20px;">Submitted Stories</h3>
<div id="storyList"></div>
</div>
</section>

<!-- MUSIC -->
<section id="music">
<div class="box">
<h2>🎶 Relaxing Music</h2>

<p>Song 1</p>
<audio controls>
<source src="music2.mp3" type="audio/mpeg">
Your browser does not support the audio element.
</audio>

<p>Song 2</p>
<audio controls>
<source src="music3.mp3" type="audio/mpeg">
Your browser does not support the audio element.
</audio>

<p>Song 3</p>
<audio controls>
<source src="music1.mp3" type="audio/mpeg">
Your browser does not support the audio element.
</audio>
</div>
</section>

<script>
// Show/Hide Sections
function showSection(id) {
    let sections = document.querySelectorAll("section");
    sections.forEach(sec => sec.classList.remove("active"));
    document.getElementById(id).classList.add("active");
    
    if(id === "complaint") {
        loadComplaints();
    } else if(id === "stories") {
        loadStories();
    }
}

// ==================== COMPLAINT FUNCTIONS ====================
async function saveComplaint() {
    let text = document.getElementById("complaintText").value;
    if (text === "") {
        alert("Please write a complaint");
        return;
    }

    const result = await addComplaint(text);

    if (result.error) {
        document.getElementById("complaintMsg").innerHTML = `<span class="error">❌ Error: ${result.error}</span>`;
        return;
    }

    document.getElementById("complaintMsg").innerHTML = `<span class="success">✅ Complaint saved successfully</span>`;
    document.getElementById("complaintText").value = "";

    loadComplaints();
}

async function loadComplaints() {
    let complaints = await fetchComplaints();
    let list = document.getElementById("complaintList");

    list.innerHTML = "";

    if (complaints.length === 0) {
        list.innerHTML = "<p>No complaints yet.</p>";
        return;
    }

    complaints.forEach((complaint, index) => {
        let div = document.createElement("div");
        div.className = "complaint-item";

        let date = new Date(complaint.time).toLocaleString();

        div.innerHTML = `
            <strong>Complaint ${index + 1}</strong><br>
            ${complaint.message}<br>
            <small>🕒 ${date}</small>
            <button class="delete-btn" onclick="deleteComplaintItem('${complaint._id}')">Delete</button>
        `;

        list.appendChild(div);
    });
}

async function deleteComplaintItem(id) {
    if(confirm("Are you sure you want to delete this complaint?")) {
        await deleteComplaint(id);
        loadComplaints();
    }
}

// ==================== STORY FUNCTIONS ====================
async function uploadStory() {
    let fileInput = document.getElementById("storyFile");
    let file = fileInput.files[0];

    if (!file) {
        alert("Please select a file");
        return;
    }

    const result = await addStory(file);

    if (result.error) {
        document.getElementById("storyMsg").innerHTML = `<span class="error">Error: ${result.error}</span>`;
        return;
    }

    document.getElementById("storyMsg").innerHTML = `<span class="success">Story uploaded successfully</span>`;
    fileInput.value = "";

    loadStories();
}

async function loadStories() {
    let stories = await fetchStories();
    let list = document.getElementById("storyList");

    list.innerHTML = "";

    if (stories.length === 0) {
        list.innerHTML = "<p>No stories yet.</p>";
        return;
    }

    stories.forEach((story, index) => {
        let div = document.createElement("div");
        div.className = "story-item";

        let date = new Date(story.time).toLocaleString();
        
        // Create a download button with onclick handler
        const downloadBtn = `<button class="open-stories-btn" onclick="downloadStory('${story._id}', '${story.originalname}')">Download File</button>`;

        div.innerHTML = `
            <strong>Story ${index + 1}</strong><br>
            📄 ${story.originalname}<br>
            <small>🕒 ${date}</small><br>
            ${downloadBtn}
            <button class="open-stories-btn" onclick="openStoryInfo('${story._id}', '${story.originalname}')" style="margin-top: 8px;">Info</button>
            <button class="delete-btn" onclick="deleteStoryItem('${story._id}')">Delete</button>
        `;

        list.appendChild(div);
    });
}

async function deleteStoryItem(id) {
    if(confirm("Are you sure you want to delete this story?")) {
        await deleteStory(id);
        loadStories();
    }
}

// ==================== SOS FUNCTIONS ====================
async function sendSOS() {
    // Show loading message
    document.getElementById("sosMsg").innerHTML = `<span class="success">Sending emergency alert...</span>`;

    try {
        // Send emergency email to admin
        const emailResult = await sendSOSEmail();
        console.log('Email result:', emailResult);

        if (emailResult.error) {
            let errorMsg = `<span class="error">Error: ${emailResult.error}</span>`;
            if (emailResult.details) {
                errorMsg += `<br><span class="error" style="font-size: 12px;">${emailResult.details}</span>`;
            }
            document.getElementById("sosMsg").innerHTML = errorMsg;
            if (emailResult.debugTips) {
                console.log('Debug tips:', emailResult.debugTips);
            }
        } else {
            document.getElementById("sosMsg").innerHTML = `
                <span class="success">SOS Alert ACTIVATED!</span><br>
                <span class="success">Emergency email sent to: ${emailResult.sentTo}</span><br>
                <span class="success">Alert Time: ${emailResult.time}</span><br>
                <span class="success">Emergency Services: Call nearby authorities</span>
            `;
            
            // Show alert notification
            alert("SOS ACTIVATED!\n\nEmergency alert has been sent successfully\n\nAsk nearby people for help immediately!");
            
            // Play siren sound
            playSiren();
        }

    } catch (error) {
        console.error('SOS Error:', error);
        document.getElementById("sosMsg").innerHTML = `<span class="error">Error: ${error.message}</span>`;
    }
}

function playSiren() {
    const siren = document.getElementById("siren");
    // Reset and play
    siren.currentTime = 0;
    siren.play().catch(e => console.log('Siren playback error:', e));
}

function showEmergencyContact() {
    const contactNumber = "8522821648";
    document.getElementById("sosMsg").innerHTML = `
        <div style="background: #FF6B00; color: white; padding: 20px; border-radius: 8px; margin: 10px auto; width: 90%;">
            <h3 style="margin-top: 0;">Emergency Contact</h3>
            <p style="font-size: 24px; font-weight: bold; margin: 15px 0;">${contactNumber}</p>
            <p style="margin: 10px 0;">Call this number immediately for emergency assistance</p>
            <button onclick="copyToClipboard('${contactNumber}')" style="background: white; color: #FF6B00; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Copy Number</button>
        </div>
    `;
}

function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(() => {
        alert("Emergency contact number copied to clipboard!");
    }).catch(err => {
        console.error('Failed to copy:', err);
    });
}

function openStories() {
    const storyList = document.getElementById("storyList");
    const stories = storyList.querySelectorAll(".story-item");
    
    if (stories.length === 0) {
        alert("No stories available to open yet. Upload some stories first!");
        return;
    }
    
    // Smooth scroll to stories section
    document.getElementById("storyList").scrollIntoView({ behavior: 'smooth' });
    
    // Highlight stories section
    storyList.style.backgroundColor = "#fff3cd";
    storyList.style.padding = "20px";
    storyList.style.borderRadius = "8px";
    storyList.style.borderLeft = "5px solid #ffc107";
    
    // Remove highlight after 3 seconds
    setTimeout(() => {
        storyList.style.backgroundColor = "";
        storyList.style.padding = "";
        storyList.style.borderRadius = "";
        storyList.style.borderLeft = "";
    }, 3000);
}

function openStoryInfo(storyId, storyName) {
    // Show story information in an alert or modal
    alert(`
Story: ${storyName}

Story ID: ${storyId}

This story file has been uploaded successfully.

To download: Click the "Download File" button next to the story.
    `);
}

function downloadStory(storyId, storyName) {
    // Create a download link and trigger it
    const downloadUrl = `/api/download-story/${storyId}`;
    const link = document.createElement('a');
    link.href = downloadUrl;
    link.download = storyName;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

// Load initial data when page opens
window.addEventListener('DOMContentLoaded', function() {
    loadComplaints();
    loadStories();
});
</script>

</body>
</html>
