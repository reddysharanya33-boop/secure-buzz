function saveComplaint() {  
    let text = document.getElementById("complaintText").value;  
    if (text === "") {  
        alert("Please write a complaint");  
        return;  
    }  
  
    let complaints = JSON.parse(localStorage.getItem("complaints")) || [];  
  
    complaints.push({  
        message: text,  
        time: new Date().toLocaleString()  
    });  
  
    localStorage.setItem("complaints", JSON.stringify(complaints));  
  
    document.getElementById("complaintMsg").innerText =  
        "✅ Complaint saved successfully";  
  
    document.getElementById("complaintText").value = "";  
  
    loadComplaints();  
}  
  
function loadComplaints() {  
    let complaints = JSON.parse(localStorage.getItem("complaints")) || [];  
    let list = document.getElementById("complaintList");  
  
    list.innerHTML = "";  
  
    complaints.forEach((c, index) => {  
        let li = document.createElement("li");  
        li.innerText = (index + 1) + ". " + c.message + " (" + c.time + ")";  
        list.appendChild(li);  
    });  
}  
  
// Load complaints when page opens  
loadComplaints();  
  
function showSection(id) {  
    let sections = document.querySelectorAll("section");  
    sections.forEach(sec => sec.classList.remove("active"));  
    document.getElementById(id).classList.add("active");  
    if(id=="complaint") {  
        loadComplaints();  
    }  
}

function displayComplaints() {  
    let list = document.getElementById("complaintList");  
    list.innerHTML = "";  
  
    let complaints = JSON.parse(localStorage.getItem("complaints")) || [];  
  
    if (complaints.length === 0) {  
        list.innerHTML = "<p>No complaints yet.</p>";  
        return;  
    }  
  
    complaints.forEach((item, index) => {  
        let div = document.createElement("div");  
        div.style.border = "1px solid #ccc";  
        div.style.padding = "8px";  
        div.style.margin = "8px";  
        div.style.borderRadius = "5px";  
  
        div.innerHTML = `  
          <strong>Complaint ${index + 1}</strong><br>  
          ${item.message}<br>  
          <small>🕒 ${item.time}</small>  
        `;  
        list.appendChild(div);  
    });  
}
